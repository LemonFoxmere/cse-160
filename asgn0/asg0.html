<!DOCTYPE html>
<html lang="en" style="width: 100%; height: 100%; padding: 0 30px; margin: 0; box-sizing: border-box;">
    <head>
        <meta charset="utf-8" />
        <title>Draw a blue rectangle (canvas version)</title>

        <style>
            *{
                box-sizing: border-box;
            }

            html {
                width: 100%;
                height: 100%;
                padding: 0 30px;
                margin: 0;
            }

            body {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                background-color: hsl(223, 10%, 14%);
            }

            #main{
                display: flex;
                flex-direction: column;
                row-gap: 20px;
            }

            #input-field{
                width: 100%;
                display: flex;
                flex-direction: column;
                row-gap: 5px;
            }
            .input-container{
                display: flex;
                justify-content: space-between;
                column-gap: 10px;
                width: 100%;
            }
            
            .labeled-input{
                display: flex;
                align-items: center;
                column-gap: 5px;
                flex: 1;
            }
            label{
                font-family: "Courier New", Courier, monospace;
                color: white;
                opacity: 0.5;
                font-size: 12px;
                white-space: nowrap;
            }
            input, select{
                -webkit-appearance: none;
                appearance: none;
                width: 100%;
            
                display: flex;

                background-color: transparent;
                padding: 7px 10px;
                margin: 0;
                border: 1px solid hsla(0, 0%, 100%, 15%);
                border-radius: 8px;

                font-family: "Courier New", Courier, monospace;
                color: white;
            }
            input[type="number"] {
                -webkit-appearance: none;
                -moz-appearance: textfield;
                appearance: textfield;
            }
            input[type="number"]::-webkit-inner-spin-button,
            input[type="number"]::-webkit-outer-spin-button {
                display: none;
            }
            
            select{
                cursor: pointer;
                background-color: hsl(223, 10%, 14%);
            }

            hr {
                width: 7px;
                height: 7px;
                border-radius: 100px;
                background-color: hsl(223, 10%, 50%);
                opacity: 0.3;
                margin: -1px auto;
                border: none;
                position: relative;
                overflow: visible;
            }

            hr::before,
            hr::after {
                content: "";
                position: absolute;
                width: 7px;
                height: 7px;
                border-radius: 100px;
                background-color: hsl(223, 10%, 50%);
                top: 0;
            }

            hr::before {
                right: calc(100% + 5px);
            }

            hr::after {
                left: calc(100% + 5px);
            }
        </style>
    </head>

    <body onload="main()">

        <main id="main">
            <canvas id="example" width="400" height="400">
                Please use a browser that supports "canvas"
            </canvas>
    
            <section id="input-field">
                <section class="input-container">
                    <div class="labeled-input">
                        <label for="v1x">v1: X</label>
                        <input id="v1x" type="text" value="2.25">
                    </div>
                    <div class="labeled-input">
                        <label for="v1y">v1: Y</label>
                        <input id="v1y" type="text" value="2.25">
                    </div>
                </section>
                <section class="input-container">
                    <div class="labeled-input">
                        <label for="v2x">v2: X</label>
                        <input id="v2x" type="text" value="2.25">
                    </div>
                    <div class="labeled-input">
                        <label for="v2y">v2: Y</label>
                        <input id="v2y" type="text" value="-2.25">
                    </div>
                </section>
                
                <input
                    id="draw"
                    type="button"
                    value="Draw"
                    style="cursor: pointer; margin-top: 10px"
                    onclick="handleDrawEvent()"
                >
            </section>
            <hr>
            <section id="input-field">
                <section class="input-container">
                    <div class="labeled-input" style="flex: none">
                        <label for="operation">Operation</label>
                        <select id="operation">
                            <option value="add">Add</option>
                            <option value="subtract">Subtract</option>
                            <option value="multiply">Multiply</option>
                            <option value="divide">Divide</option>
                            <option value="magnitude">Magnitude</option>
                            <option value="normalize">Normalize</option>
                            <option value="angbtwn">Angle Between</option>
                            <option value="area">Area</option>
                        </select>
                    </div>
                    <div class="labeled-input">
                        <label for="scalar">Scalar</label>
                        <input id="scalar" type="number" value="1" step="any">
                    </div>
                </section>

                <input
                    id="draw"
                    type="button"
                    value="Draw"
                    style="cursor: pointer; margin-top: 10px"
                    onclick="handleDrawOperationEvent()"
                >
            </section>
        </main>

        <script src="asg0.js"></script>
        <script src="lib/cuon-matrix-cse160.js"></script>
    </body>
</html>
